name: rails_event_store-hotwire_browser_assets
on:
  workflow_dispatch:
  repository_dispatch:
    types:
    - script
  push:
jobs:
  assets:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      WORKING_DIRECTORY: contrib/rails_event_store-hotwire_browser
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - run: make build
      working-directory: "${{ env.WORKING_DIRECTORY }}"
      env:
        RUBYOPT: "--enable-frozen-string-literal"
    - run: echo "SHORT_SHA=$(git rev-parse --short=12 HEAD)" >> $GITHUB_ENV
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: "${{ secrets.AWS_ACCESS_KEY_ID }}"
        aws-secret-access-key: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
        aws-region: eu-central-1
    - run: aws s3 sync ${{ env.WORKING_DIRECTORY }}/public s3://ruby-event-store-assets/${{ env.SHORT_SHA }}