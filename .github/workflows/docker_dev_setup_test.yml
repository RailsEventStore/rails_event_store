name: docker_dev_setup_test
on:
  workflow_dispatch:
  repository_dispatch:
    types:
    - script
  push:
    branches:
    - master
    paths:
    - support/docker/**
    - ruby_event_store-browser/Makefile
    - ruby_event_store-active_record/Makefile
    - ".github/workflows/docker_dev_setup_test.yml"
  pull_request:
    paths:
    - support/docker/**
    - ruby_event_store-browser/Makefile
    - ruby_event_store-active_record/Makefile
    - ".github/workflows/docker_dev_setup_test.yml"
jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - run: docker compose -f support/docker/docker-compose.yml up --build -d
    - run: |
        for i in $(seq 1 30); do
          curl -sf -o /dev/null http://127.0.0.1:9393/ && exit 0
          sleep 1
        done
        exit 1
    - if: always()
      run: docker compose -f support/docker/docker-compose.yml logs
    - if: always()
      run: docker compose -f support/docker/docker-compose.yml down
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORKING_DIRECTORY: ruby_event_store-active_record
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - run: make docker-test
      working-directory: "${{ env.WORKING_DIRECTORY }}"
    - if: always()
      run: docker compose -f ../support/docker/docker-compose.test.yml down
      working-directory: "${{ env.WORKING_DIRECTORY }}"
