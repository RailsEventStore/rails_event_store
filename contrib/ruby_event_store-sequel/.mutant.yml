# https://github.com/mbj/mutant/blob/master/docs/configuration.md

usage: opensource
requires:
  - ruby_event_store/sequel
includes:
  - lib
integration:
  name: rspec
mutation:
  operators: light
  timeout: 1.0
coverage_criteria:
  timeout: true
  process_abort: true
matcher:
  subjects:
    - RubyEventStore::Sequel*
  ignore:
    - RubyEventStore::Sequel::EventRepository#record
    - RubyEventStore::Sequel::EventRepository#commit_on_duplicate_key_update
    - RubyEventStore::Sequel::EventRepository#commit_insert_conflict_update
    - RubyEventStore::Sequel::IndexViolationDetector#detect
    - RubyEventStore::Sequel::IndexViolationDetector#detect_mysql
    - RubyEventStore::Sequel::IndexViolationDetector#detect_postgres
    - RubyEventStore::Sequel::IndexViolationDetector#initialize
