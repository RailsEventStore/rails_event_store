services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: rails_event_store
      POSTGRES_PASSWORD: secret
    ports:
      - "127.0.0.1:5432:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: rails_event_store
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "127.0.0.1:3306:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: ../..
      dockerfile: support/docker/Dockerfile
      target: test
      args:
        GEM_DIR: ruby_event_store-active_record
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres:5432/rails_event_store
    volumes:
      - ../..:/app
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy

  mutate:
    build:
      context: ../..
      dockerfile: support/docker/Dockerfile
      target: mutate
      args:
        GEM_DIR: ruby_event_store-active_record
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres:5432/rails_event_store
    volumes:
      - ../..:/app
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
